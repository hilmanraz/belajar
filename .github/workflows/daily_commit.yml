name: Daily Auto Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          git config --local user.email "hilman.raz@gmail.com"
          git config --local user.name "Auto Bot"
          for i in {1..20}; do
            echo "Auto commit ke-$i pada $(date)" >> bot_log.txt
            git add bot_log.txt
            git commit -m "bot: daily auto-commit $i"
          done

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
